services:
  mc:
    image: itzg/minecraft-server:java21
    pull_policy: always
    ports:
      - "${PORT:-25565}:25565"
    environment:
      # --- EULA & server type ---
      EULA: "TRUE"
      TYPE: FABRIC
      VERSION: "1.21.11"

      # --- Server identity ---
      SERVER_NAME: ${MINECRAFT_SERVER_NAME:-Culture Craft}
      MOTD: ${MINECRAFT_MOTD:-§aCulture Craft§r}
      ICON: /logo.png
      OVERRIDE_ICON: "true"

      # --- Gameplay ---
      DIFFICULTY: ${MINECRAFT_DIFFICULTY:-normal}
      MODE: ${MINECRAFT_GAME_MODE:-survival}
      HARDCORE: ${MINECRAFT_HARDCORE:-false}
      MAX_PLAYERS: ${MINECRAFT_MAX_PLAYERS:-10}
      PVP: ${MINECRAFT_PVP:-true}
      ALLOW_NETHER: ${MINECRAFT_ALLOW_NETHER:-true}
      ANNOUNCE_PLAYER_ACHIEVEMENTS: ${MINECRAFT_ANNOUNCE_PLAYER_ACHIEVEMENTS:-true}
      GENERATE_STRUCTURES: ${MINECRAFT_GENERATE_STRUCTURES:-true}
      SPAWN_ANIMALS: ${MINECRAFT_SPAWN_ANIMALS:-true}
      SPAWN_MONSTERS: ${MINECRAFT_SPAWN_MONSTERS:-true}
      SPAWN_NPCS: ${MINECRAFT_SPAWN_NPCS:-true}
      FORCE_GAMEMODE: ${MINECRAFT_FORCE_GAMEMODE:-false}
      ENABLE_COMMAND_BLOCK: ${MINECRAFT_ENABLE_COMMAND_BLOCK:-false}
      ONLINE_MODE: ${MINECRAFT_ONLINE_MODE:-true}
      SNOOPER_ENABLED: ${MINECRAFT_SNOOPER_ENABLED:-false}
      OPS: ${OPS:-}

      # --- World / network tuning (small-VPS defaults) ---
      MAX_WORLD_SIZE: ${MINECRAFT_MAX_WORLD_SIZE:-10000}
      MAX_BUILD_HEIGHT: ${MINECRAFT_MAX_BUILD_HEIGHT:-256}
      VIEW_DISTANCE: ${MINECRAFT_VIEW_DISTANCE:-8}
      SIMULATION_DISTANCE: ${MINECRAFT_SIMULATION_DISTANCE:-6}
      MAX_TICK_TIME: ${MINECRAFT_MAX_TICK_TIME:-60000}
      NETWORK_COMPRESSION_THRESHOLD: ${MINECRAFT_NETWORK_COMPRESSION_THRESHOLD:-512}
      SYNC_CHUNK_WRITES: "false"
      USE_NATIVE_TRANSPORT: "true"

      # --- Idle pause (native server property, MC 1.21.2+) ---
      PAUSE_WHEN_EMPTY_SECONDS: ${MINECRAFT_PAUSE_WHEN_EMPTY_SECONDS:-600}
      PLAYER_IDLE_TIMEOUT: ${MINECRAFT_PLAYER_IDLE_TIMEOUT:-0}

      # --- JVM / memory ---
      INIT_MEMORY: ${MINECRAFT_INIT_MEMORY:-1G}
      MAX_MEMORY: ${MINECRAFT_MAX_MEMORY:-2G}
      USE_MEOWICE_FLAGS: "true"
      GUI: "false"

      # --- Mods: auto-install performance stack from Modrinth + local ./mods ---
      MODRINTH_PROJECTS: ${MODRINTH_PROJECTS:-lithium,ferrite-core,krypton,spark,alternate-current}
      MODRINTH_DOWNLOAD_DEPENDENCIES: required
      REMOVE_OLD_MODS: "true"

      # --- RCON (not exposed; access via `docker compose exec mc rcon-cli`) ---
      ENABLE_RCON: "true"
      RCON_PASSWORD: ${RCON_PASSWORD:?RCON_PASSWORD must be set in .env}

    volumes:
      - ./minecraft-data:/data
      - ./mods:/mods:ro
      - ./logo.png:/logo.png:ro

    healthcheck:
      test: ["CMD", "mc-health"]
      start_period: 1m
      interval: 10s
      timeout: 10s
      retries: 20

    restart: unless-stopped
    stop_grace_period: 1m
